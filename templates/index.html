<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jarvis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg0: #050a0f;
      --bg1: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --txt:  #e6edf3;
      --muted:#8b949e;
      --blue: #58a6ff;
      --green:#3fb950;
      --purple:#8b5cf6;
      --orange:#f0883e;
      --red:  #f85149;
      --spicy-magenta:#f472b6;
      --spicy-coral:#ff6b6b;
      --spicy-gold:#ffd43b;
      --spicy-violet:#c084fc;
      --spicy-electric:#22d3ee;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg0);
      color: var(--txt);
      height: 100vh;
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      grid-template-rows: 48px 1fr;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      grid-column: 1 / -1;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }
    #topbar .logo { font-size:14px;font-weight:700;color:var(--blue);letter-spacing:3px;margin-right:auto; }
    .tbtn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); padding: 4px 10px; font-size: 11px; cursor: pointer;
    }
    .tbtn:hover { background: var(--bg2); color: var(--txt); }
    .tbtn.active { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.08); }
    #api-dot { width:8px;height:8px;border-radius:50%;background:var(--border); }
    #api-dot.online  { background:var(--green);box-shadow:0 0 6px var(--green); }
    #api-dot.offline { background:var(--red); }

    /* ── Settings drawer ── */
    #settings {
      position:fixed;top:0;right:0;width:340px;height:100vh;
      background:var(--bg1);border-left:1px solid var(--border);
      padding:18px;display:flex;flex-direction:column;gap:12px;
      transform:translateX(100%);transition:transform .25s;z-index:200;overflow-y:auto;
    }
    #settings-close {
      position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;
      background:var(--bg1);padding-bottom:10px;border-bottom:1px solid var(--border);
      margin-bottom:2px;flex-shrink:0;
    }
    #settings-close span { font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:1px; }
    #settings-close button {
      background:var(--bg3);border:1px solid var(--border);border-radius:6px;
      color:var(--muted);width:28px;height:28px;font-size:16px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;line-height:1;
    }
    #settings-close button:hover { background:var(--border);color:var(--txt); }
    #settings.open { transform:translateX(0); }
    .sg { display:flex;flex-direction:column;gap:5px; }
    .sg label { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px; }
    .sg input,.sg select {
      background:var(--bg2);border:1px solid var(--border);border-radius:6px;
      color:var(--txt);padding:7px 10px;font-size:12px;width:100%;
    }
    .sg input:focus,.sg select:focus { outline:none;border-color:var(--blue); }
    .srow { display:flex;gap:8px;align-items:center;flex-wrap:wrap; }
    .sbtn {
      background:var(--bg3);border:1px solid var(--border);border-radius:6px;
      color:var(--txt);padding:6px 12px;font-size:11px;cursor:pointer;
    }
    .sbtn:hover{background:var(--border);}
    .sbtn.p{background:#1f6feb;border-color:#1f6feb;} .sbtn.p:hover{background:#388bfd;}
    .sbtn.d{background:#6e2c2c;border-color:#8b3030;} .sbtn.d:hover{background:#8b3030;}
    #dl-msg,#sv-msg{font-size:10px;color:var(--green);}
    #settings hr{border:none;border-top:1px solid var(--border);}
    #settings h3{font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;}

    /* ── Left sidebar — Topics ── */
    #sidebar-left {
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sb-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sb-header button {
      background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:0 2px;
    }
    .sb-header button:hover{color:var(--txt);}
    #topics-list { flex:1;overflow-y:auto;padding:8px 0; }
    .topic-item {
      padding: 8px 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .topic-item:hover { background: var(--bg2); }
    .topic-item.active { border-left-color: var(--blue); background: rgba(88,166,255,.06); }
    .topic-dot { width:6px;height:6px;border-radius:50%;background:var(--border);margin-top:5px;flex-shrink:0; }
    .topic-item.active .topic-dot { background:var(--blue);box-shadow:0 0 5px var(--blue); }
    .topic-body { flex:1;min-width:0; }
    .topic-title { font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .topic-desc  { font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .topic-del {
      background:none;border:none;color:var(--border);font-size:14px;cursor:pointer;
      flex-shrink:0;line-height:1;padding:0;opacity:0;transition:opacity .15s;
    }
    .topic-item:hover .topic-del { opacity:1; }
    .topic-del:hover { color:var(--red); }
    #topic-add {
      padding:8px 12px;border-top:1px solid var(--border);
      display:flex;gap:6px;
    }
    #topic-add input {
      flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;
      color:var(--txt);padding:5px 8px;font-size:11px;
    }
    #topic-add input:focus{outline:none;border-color:var(--blue);}
    #topic-add button {
      background:#1f6feb;border:none;border-radius:6px;color:#fff;
      padding:5px 10px;font-size:12px;cursor:pointer;
    }
    #topic-add button:hover{background:#388bfd;}

    /* ── Center ── */
    #center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 20px;
      position: relative;
      overflow-y: auto;
      padding: 24px 16px 16px;
    }

    /* Orb */
    #orb-wrap {
      width:160px;height:160px;cursor:pointer;
      filter:drop-shadow(0 12px 28px rgba(244,114,182,.22));
      animation:orb-float 5s ease-in-out infinite;
    }
    @keyframes orb-float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-5px)}
    }
    #orb {
      width:160px;height:160px;border-radius:50%;
      background:radial-gradient(circle at 28% 26%,#5b21b6 0%,#3b0764 38%,#1a0a12 72%,#050308 100%);
      box-shadow:
        0 0 0 1px rgba(244,114,182,.35),
        0 0 45px rgba(236,72,153,.4),
        0 0 90px rgba(192,132,252,.25),
        inset 0 0 36px rgba(0,0,0,.62),
        inset 0 -12px 28px rgba(255,107,107,.12);
      display:flex;align-items:center;justify-content:center;
      transition:box-shadow .35s,background .35s,filter .35s;
      animation:orb-idle-glow 3.2s ease-in-out infinite;
    }
    @keyframes orb-idle-glow{
      0%,100%{filter:brightness(1)saturate(1.05);box-shadow:
        0 0 0 1px rgba(244,114,182,.3),
        0 0 40px rgba(236,72,153,.35),
        0 0 85px rgba(192,132,252,.2),
        inset 0 0 36px rgba(0,0,0,.62),
        inset 0 -12px 28px rgba(255,107,107,.1);}
      50%{filter:brightness(1.12)saturate(1.2);box-shadow:
        0 0 0 2px rgba(34,211,238,.45),
        0 0 55px rgba(244,114,182,.55),
        0 0 110px rgba(124,58,237,.35),
        inset 0 0 32px rgba(0,0,0,.55),
        inset 0 -14px 32px rgba(255,212,59,.18);}
    }
    #orb svg{opacity:.95;filter:drop-shadow(0 0 8px rgba(255,212,59,.35));}
    body.listening #orb { background:radial-gradient(circle at 32% 30%,#14532d 0%,#052e16 55%,#020617 100%);animation:pulse-l 1.15s ease-in-out infinite; }
    @keyframes pulse-l {
      0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.45),0 0 50px rgba(34,197,94,.45),inset 0 0 30px rgba(0,0,0,.55);}
      50%{box-shadow:0 0 0 22px rgba(74,222,128,0),0 0 95px rgba(250,204,21,.35),inset 0 0 28px rgba(0,0,0,.5);}
    }
    body.thinking #orb { background:radial-gradient(circle at 30% 28%,#86198f 0%,#4c0519 45%,#0c0a0f 100%);animation:spin-g 1.25s linear infinite; }
    @keyframes spin-g{0%{filter:hue-rotate(0deg)saturate(1.35)brightness(1.05)}100%{filter:hue-rotate(360deg)saturate(1.35)brightness(1.05)}}
    body.speaking #orb { background:radial-gradient(circle at 30% 28%,#0e7490 0%,#312e81 50%,#0f172a 100%);animation:pulse-s .55s ease-in-out infinite alternate; }
    @keyframes pulse-s {
      from{box-shadow:0 0 25px rgba(34,211,238,.35),0 0 70px rgba(244,114,182,.25),inset 0 0 30px rgba(0,0,0,.55);}
      to{box-shadow:0 0 55px rgba(244,114,182,.65),0 0 120px rgba(192,132,252,.4),inset 0 0 26px rgba(0,0,0,.45);}
    }

    #state-label {
      font-size:11px;letter-spacing:3px;text-transform:uppercase;
      color:var(--border);transition:color .3s;text-align:center;
    }
    body.listening #state-label{color:var(--green);}
    body.thinking  #state-label{color:var(--purple);}
    body.speaking  #state-label{color:var(--spicy-magenta);text-shadow:0 0 18px rgba(244,114,182,.45);}

    #wave{display:flex;align-items:center;gap:3px;height:24px;opacity:0;transition:opacity .3s;}
    body.speaking #wave,body.listening #wave{opacity:1;}
    .bar{width:3px;border-radius:2px;background:linear-gradient(180deg,var(--spicy-electric),var(--spicy-magenta));animation:wa .8s ease-in-out infinite;box-shadow:0 0 6px rgba(244,114,182,.4);}
    body.listening .bar{background:linear-gradient(180deg,#4ade80,var(--spicy-gold));box-shadow:0 0 6px rgba(74,222,128,.45);}
    .bar:nth-child(1){animation-delay:.0s;height:6px}.bar:nth-child(2){animation-delay:.1s;height:14px}
    .bar:nth-child(3){animation-delay:.2s;height:10px}.bar:nth-child(4){animation-delay:.3s;height:18px}
    .bar:nth-child(5){animation-delay:.4s;height:12px}.bar:nth-child(6){animation-delay:.5s;height:20px}
    .bar:nth-child(7){animation-delay:.6s;height:8px}.bar:nth-child(8){animation-delay:.7s;height:16px}
    .bar:nth-child(9){animation-delay:.8s;height:6px}
    @keyframes wa{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}

    #transcript{max-width:520px;width:100%;text-align:center;min-height:52px;padding:0 20px;}
    #tx-you{font-size:12px;color:var(--blue);font-style:italic;min-height:16px;}
    #tx-jarvis{
      position:relative;
      font-size:14px;font-weight:500;
      color:#fdf4ff;
      min-height:20px;line-height:1.65;margin-top:10px;padding:14px 18px 16px;
      text-align:left;
      width:fit-content;max-width:100%;margin-left:auto;margin-right:auto;
      border-radius:18px 18px 18px 6px;
      background:linear-gradient(145deg,rgba(76,29,149,.35),rgba(67,20,7,.55));
      border:1px solid rgba(244,114,182,.45);
      box-shadow:
        0 0 0 1px rgba(34,211,238,.12) inset,
        0 4px 24px rgba(0,0,0,.45),
        0 0 40px rgba(236,72,153,.18);
      text-shadow:0 1px 2px rgba(0,0,0,.35);
      overflow-wrap:anywhere;
      animation:jarvis-bubble-shimmer 4.5s ease-in-out infinite;
    }
    #tx-jarvis:empty{display:none;}
    @keyframes jarvis-bubble-shimmer{
      0%,100%{border-color:rgba(244,114,182,.42);box-shadow:
        0 0 0 1px rgba(34,211,238,.1) inset,
        0 4px 24px rgba(0,0,0,.45),
        0 0 36px rgba(192,132,252,.15);}
      50%{border-color:rgba(34,211,238,.5);box-shadow:
        0 0 0 1px rgba(255,212,59,.15) inset,
        0 4px 28px rgba(0,0,0,.5),
        0 0 48px rgba(244,114,182,.28);}
    }

    #tool-pill{
      position:absolute;bottom:14px;
      background:var(--bg2);border:1px solid var(--border);border-radius:16px;
      padding:3px 12px;font-size:10px;color:var(--muted);display:none;
    }
    #tool-pill.on{display:block;}

    /* ── Code panel ── */
    #code-panel {
      width:100%;max-width:680px;
      background:var(--bg1);border:1px solid var(--border);border-radius:10px;
      overflow:hidden;display:none;flex-direction:column;
      max-height:340px;
    }
    #code-panel.has-code { display:flex; }
    #code-panel-header {
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 12px;border-bottom:1px solid var(--border);
      font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;
    }
    #code-panel-header button {
      background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;
      padding:0 2px;line-height:1;
    }
    #code-panel-header button:hover{color:var(--txt);}
    #code-blocks { overflow-y:auto;flex:1; }
    .code-block { border-bottom:1px solid var(--border); }
    .code-block:last-child { border-bottom:none; }
    .code-block-toolbar {
      display:flex;align-items:center;justify-content:space-between;
      padding:4px 12px;background:var(--bg2);
    }
    .code-lang { font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:1px; }
    .copy-btn {
      background:var(--bg3);border:1px solid var(--border);border-radius:5px;
      color:var(--muted);font-size:10px;padding:2px 9px;cursor:pointer;
    }
    .copy-btn:hover{background:var(--border);color:var(--txt);}
    .copy-btn.copied{color:var(--green);border-color:var(--green);}
    .code-block pre {
      margin:0;padding:10px 14px;font-family:'Consolas','Fira Code',monospace;
      font-size:12px;line-height:1.55;color:var(--txt);
      white-space:pre;overflow-x:auto;background:var(--bg0);
    }

    /* ── Right sidebar — Tailscale + Concepts ── */
    #sidebar-right {
      background: var(--bg1);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #ts-panel { flex:0 0 auto;max-height:45%;display:flex;flex-direction:column;border-bottom:1px solid var(--border); }
    #concepts-panel { flex:1;display:flex;flex-direction:column;overflow:hidden; }
    #ts-list,#concepts-list { flex:1;overflow-y:auto;padding:6px 0; }

    .ts-machine {
      padding:6px 10px;display:flex;align-items:flex-start;gap:7px;
      font-size:11px;color:var(--txt);border-bottom:1px solid rgba(48,54,61,.4);
    }
    .ts-machine:last-child{border-bottom:none;}
    .ts-dots{display:flex;flex-direction:column;gap:3px;padding-top:3px;flex-shrink:0;}
    .ts-dot{width:6px;height:6px;border-radius:50%;}
    .ts-dot.ts{background:var(--green);box-shadow:0 0 4px var(--green);}
    .ts-dot.ts.off{background:var(--border);box-shadow:none;}
    .ts-dot.ssh-live{background:var(--blue);box-shadow:0 0 4px var(--blue);}
    .ts-dot.ssh-dead{background:var(--red);}
    .ts-dot.ssh-none{background:transparent;border:1px solid var(--border);}
    .ts-info{flex:1;min-width:0;}
    .ts-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ts-sub{font-size:9px;color:var(--muted);margin-top:1px;}
    .ts-metrics{font-size:9px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;}
    .ts-metric{background:var(--bg3);border-radius:4px;padding:1px 5px;}
    .ts-metric.warn{color:var(--orange);}
    .ts-metric.crit{color:var(--red);}
    .ts-self-badge{font-size:8px;color:var(--blue);border:1px solid var(--blue);border-radius:3px;padding:0 3px;margin-left:4px;}

    .concept-item {
      padding:5px 12px;display:flex;align-items:center;gap:8px;font-size:10px;
    }
    .concept-badge {
      font-size:9px;padding:1px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0;
    }
    .concept-badge.info    {background:rgba(88,166,255,.15);color:var(--blue);}
    .concept-badge.warning {background:rgba(248,81,73,.15);color:var(--red);}
    .concept-badge.system  {background:rgba(139,92,246,.15);color:var(--purple);}
    .concept-badge.network {background:rgba(63,185,80,.15);color:var(--green);}
    .concept-badge.idea    {background:rgba(240,136,62,.15);color:var(--orange);}
    .concept-text{flex:1;color:var(--txt);line-height:1.3;}
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="logo">J A R V I S</span>
  <div id="api-dot" title="LM Studio connection"></div>
  <button class="tbtn" id="ao-btn" onclick="toggleAlwaysOn()">⟳ Always On</button>
  <button class="tbtn" onclick="resetConversation()">New Chat</button>
  <button class="tbtn" onclick="toggleSettings()">⚙ Settings</button>
</div>

<!-- Left sidebar: Topics -->
<div id="sidebar-left">
  <div class="sb-header">
    Topics
    <button onclick="clearActiveTopic()" title="Clear active topic">✕</button>
  </div>
  <div id="topics-list"></div>
  <div id="topic-add">
    <input id="topic-input" placeholder="Add topic…" onkeydown="if(event.key==='Enter')addTopicUI()"/>
    <button onclick="addTopicUI()">+</button>
  </div>
</div>

<!-- Center -->
<div id="center">
  <div id="orb-wrap" onclick="orbClick()">
    <div id="orb">
      <svg width="54" height="54" viewBox="0 0 60 60" aria-hidden="true">
        <defs>
          <linearGradient id="orbJGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fde68a"/>
            <stop offset="45%" stop-color="#f472b6"/>
            <stop offset="100%" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
              font-family="Segoe UI,sans-serif" font-size="38" font-weight="700" fill="url(#orbJGrad)">J</text>
      </svg>
    </div>
  </div>
  <div id="wave">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div id="state-label">Ready</div>
  <div id="transcript">
    <div id="tx-you"></div>
    <div id="tx-jarvis"></div>
  </div>
  <div id="tool-pill"></div>
  <div id="code-panel">
    <div id="code-panel-header">
      <span>Code</span>
      <button onclick="clearCodePanel()" title="Clear">✕</button>
    </div>
    <div id="code-blocks"></div>
  </div>
</div>

<!-- Right sidebar: Tailscale + Concepts -->
<div id="sidebar-right">
  <div id="ts-panel">
    <div class="sb-header">Tailscale Network</div>
    <div id="ts-list"></div>
  </div>
  <div id="concepts-panel">
    <div class="sb-header">Concepts</div>
    <div id="concepts-list"></div>
  </div>
</div>

<!-- Settings drawer -->
<div id="settings">
  <div id="settings-close">
    <span>Settings</span>
    <button onclick="toggleSettings()" title="Close">✕</button>
  </div>

  <h3>LM Studio</h3>
  <div class="sg"><label>API URL</label>
    <input id="cfg-url" type="text" value="{{ config.url }}"/></div>
  <div class="sg"><label>Model</label>
    <input id="cfg-model" type="text" value="{{ config.model }}"/></div>
  <div class="sg"><label>API Key</label>
    <input id="cfg-key" type="password" value="{{ config.api_key }}"/></div>
  <div class="srow">
    <button class="sbtn p" onclick="saveConfig()">Save</button>
    <button class="sbtn" onclick="pingServer()">Test</button>
    <span id="sv-msg"></span>
  </div>

  <hr/>
  <h3>Microphone</h3>
  <div class="sg"><label>Input Device</label>
    <select id="mic-select"><option value="">Default</option></select></div>

  <hr/>
  <h3>Voice &amp; Audio Output</h3>

  <div class="sg"><label>Piper Voice</label>
    <select id="cfg-voice">
      <option value="en_US-amy-medium">en_US-amy-medium</option>
      <option value="en_US-lessac-medium">en_US-lessac-medium</option>
      <option value="en_US-ryan-high">en_US-ryan-high (best quality)</option>
      <option value="en_GB-alan-medium">en_GB-alan-medium</option>
      <option value="en_GB-jenny-diphone">en_GB-jenny-diphone</option>
    </select>
  </div>
  <div class="srow">
    <button class="sbtn" onclick="downloadVoice()">Download Voice</button>
    <span id="dl-msg"></span>
  </div>

  <div class="sg"><label>Output Device</label>
    <select id="cfg-sink">
      <option value="">System Default</option>
    </select>
  </div>

  <div class="sg"><label>Audio Style</label>
    <select id="cfg-style">
      <option value="natural">Natural — clean pass-through</option>
      <option value="enhanced">Enhanced — presence boost, fuller sound</option>
      <option value="warm">Warm — softer highs, great for Bluetooth</option>
      <option value="crisp">Crisp — removes mud, clear articulation</option>
      <option value="broadcast">Broadcast — bandpass + normalize (podcast feel)</option>
    </select>
  </div>

  <div class="sg">
    <label>Speed <span id="speed-val" style="color:var(--txt)">1.0×</span></label>
    <input id="cfg-speed" type="range" min="0.6" max="1.8" step="0.05" value="1.0" style="padding:0"/>
  </div>

  <div class="sg">
    <label>Volume <span id="vol-val" style="color:var(--txt)">1.0×</span></label>
    <input id="cfg-volume" type="range" min="0.3" max="2.0" step="0.05" value="1.0" style="padding:0"/>
  </div>

  <button class="sbtn p" onclick="saveAudio()">Apply Audio Settings</button>
  <button class="sbtn" onclick="testTts()">▶ Test Voice</button>

  <hr/>
  <h3>SSH Hosts</h3>
  <div id="ssh-host-list" style="font-size:10px;color:var(--muted);margin-bottom:6px;"></div>
  <div class="sg"><label>Hostname</label><input id="ssh-hostname" placeholder="server-01"/></div>
  <div class="sg"><label>Tailscale IP</label><input id="ssh-ip" placeholder="100.x.x.x"/></div>
  <div class="sg"><label>Username</label><input id="ssh-user" placeholder="root" value="root"/></div>
  <div class="sg"><label>Port</label><input id="ssh-port" placeholder="22" value="22" style="width:70px"/></div>
  <div class="sg"><label>Key Path (optional)</label><input id="ssh-key" placeholder="~/.ssh/id_ed25519"/></div>
  <div class="sg"><label>Password (optional)</label><input id="ssh-pass" type="password" placeholder="leave blank if using key"/></div>
  <div class="srow">
    <button class="sbtn p" onclick="addSshHost()">Add &amp; Monitor</button>
    <button class="sbtn" onclick="testSshHost()">Test</button>
    <span id="ssh-msg" style="font-size:10px;color:var(--green);"></span>
  </div>
  <div id="ssh-test-out" style="font-size:10px;color:var(--muted);font-family:monospace;white-space:pre-wrap;max-height:60px;overflow:auto;"></div>

  <hr/>
  <button class="sbtn d" onclick="resetConversation()">Clear Conversation</button>
</div>

<script>
/* ── State ── */
let alwaysOn = false, isListening = false, isBusy = false;
let recognition = null, micId = "";
let _sessionText = '';   // transcript for the current recognition session only

const stateLabel = document.getElementById('state-label');
const txYou      = document.getElementById('tx-you');
const txJarvis   = document.getElementById('tx-jarvis');
const toolPill   = document.getElementById('tool-pill');

function setState(s) {
  document.body.className = s || '';
  stateLabel.textContent = { '':'Ready', listening:'Listening…', thinking:'Thinking…', speaking:'Speaking…' }[s] ?? s;
}
function showTool(n) { toolPill.textContent = `⚙ ${n}`; toolPill.classList.add('on'); }
function hideTool()  { toolPill.classList.remove('on'); }
function delay(ms)   { return new Promise(r => setTimeout(r, ms)); }

/* ── Always-on ── */
function toggleAlwaysOn() {
  alwaysOn = !alwaysOn;
  document.getElementById('ao-btn').classList.toggle('active', alwaysOn);
  if (alwaysOn && !isBusy && !isListening) startListening();
}

/* ── Orb / interrupt ── */
function orbClick() {
  if (isBusy || isListening) { interrupt(); return; }
  startListening();
}
function interrupt() {
  fetch('/tts/stop', {method:'POST'}).catch(()=>{});
  recognition?.abort();
  setState(''); isBusy = false; isListening = false;
}

/* ── Speech recognition ── */
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Speech recognition requires Chrome or Chromium.'); return; }
  isBusy = true; isListening = true;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart  = () => {
    _sessionText = '';          // reset for this session — never carry over old text
    txYou.textContent = '';
    setState('listening');
  };
  recognition.onresult = e => {
    let interim = '', final = '';
    recognition._finalConf = 0;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
        if (e.results[i][0].confidence > recognition._finalConf)
          recognition._finalConf = e.results[i][0].confidence;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    _sessionText = final || interim;          // store in session var, not DOM
    txYou.textContent = _sessionText.trim();
  };
  recognition.onerror = e => {
    isListening = false;
    _sessionText = '';
    if (e.error === 'no-speech' && alwaysOn) { isBusy = false; setTimeout(startListening, 800); return; }
    setState(''); isBusy = false;
    if (alwaysOn) setTimeout(() => { if (!isBusy) startListening(); }, 1500);
  };
  recognition.onend = async () => {
    isListening = false;
    const text = _sessionText.trim();
    const conf = recognition._finalConf || 0;
    _sessionText = '';                        // always clear — never bleed into next session
    const words = text.split(/\s+/).filter(Boolean).length;
    // Reject: empty, single-word noise, or low confidence
    if (!text || words < 2 || (conf > 0 && conf < 0.50)) {
      txYou.textContent = '';
      isBusy = false;
      if (alwaysOn) setTimeout(() => { if (!isBusy) startListening(); }, 800);
      return;
    }
    await sendToJarvis(text);
  };

  if (micId) {
    navigator.mediaDevices.getUserMedia({audio:{deviceId:{exact:micId}}})
      .then(()=>recognition.start()).catch(()=>recognition.start());
  } else { recognition.start(); }
}

/* ── Code panel ── */
function showCodeBlocks(blocks) {
  const panel = document.getElementById('code-panel');
  const container = document.getElementById('code-blocks');
  if (!blocks?.length) return;
  container.innerHTML = blocks.map((b, i) => `
    <div class="code-block">
      <div class="code-block-toolbar">
        <span class="code-lang">${esc(b.lang)}</span>
        <button class="copy-btn" onclick="copyBlock(${i}, this)">Copy</button>
      </div>
      <pre id="cb-${i}">${esc(b.code)}</pre>
    </div>`).join('');
  panel.classList.add('has-code');
  // stash blocks for copy
  panel._blocks = blocks;
}

function copyBlock(i, btn) {
  const panel = document.getElementById('code-panel');
  const code  = panel._blocks?.[i]?.code ?? document.getElementById(`cb-${i}`)?.textContent ?? '';
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function clearCodePanel() {
  const panel = document.getElementById('code-panel');
  panel.classList.remove('has-code');
  document.getElementById('code-blocks').innerHTML = '';
  panel._blocks = [];
}

/* ── Send to Jarvis ── */
async function sendToJarvis(text) {
  setState('thinking'); txJarvis.textContent = '';
  try {
    const res  = await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    const data = await res.json();
    if (data.tools?.length) {
      for (const t of data.tools) { showTool(t.tool); await delay(300); }
      hideTool();
      // Refresh panels after tool calls that may have modified topics/concepts
      loadTopics(); loadConcepts();
    }
    if (data.code_blocks?.length) showCodeBlocks(data.code_blocks);
    const reply = data.error ? `Error: ${data.error}` : (data.reply||'');
    txJarvis.textContent = reply;
    await speakPiper(reply);
  } catch(e) {
    setState(''); isBusy=false; txJarvis.textContent='Connection error.';
    if (alwaysOn) setTimeout(()=>{ if(!isBusy) startListening(); },1500);
  }
}

/* ── Piper TTS — plays server-side via paplay, Chrome never touches audio ── */
async function speakPiper(text) {
  if (!text) { done(); return; }
  setState('speaking');
  try {
    const res = await fetch('/tts', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    if (res.status === 503) {
      const d = await res.json();
      txJarvis.textContent += ` [Voice "${d.voice}" not downloaded — open Settings]`;
    } else if (res.status === 500) {
      const d = await res.json().catch(()=>({}));
      console.warn('TTS error:', d.error);
    }
  } catch(e) { /* network error */ }
  done();
}
function done() {
  setState(''); isBusy = false;
  // 1.8s gap after speaking — enough for paplay to fully drain and headphones to settle
  if (alwaysOn) setTimeout(() => { if (!isBusy && !isListening) startListening(); }, 1800);
}

/* ── Topics UI ── */
async function loadTopics() {
  const res  = await fetch('/api/topics');
  const data = await res.json();
  const list = document.getElementById('topics-list');
  list.innerHTML = '';
  (data.topics||[]).forEach(t=>{
    const div = document.createElement('div');
    div.className = 'topic-item' + (t.active ? ' active' : '');
    div.innerHTML = `
      <div class="topic-dot"></div>
      <div class="topic-body">
        <div class="topic-title">${esc(t.title)}</div>
        ${t.description ? `<div class="topic-desc">${esc(t.description)}</div>` : ''}
      </div>
      <button class="topic-del" onclick="deleteTopic(${t.id},event)" title="Remove">×</button>`;
    div.addEventListener('click', ()=>activateTopic(t.id));
    list.appendChild(div);
  });
}

async function addTopicUI() {
  const inp = document.getElementById('topic-input');
  const val = inp.value.trim();
  if (!val) return;
  await fetch('/api/topics',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:val})});
  inp.value='';
  loadTopics();
}

async function deleteTopic(id, e) {
  e.stopPropagation();
  await fetch(`/api/topics/${id}`,{method:'DELETE'});
  loadTopics();
}

async function activateTopic(id) {
  await fetch(`/api/topics/${id}/activate`,{method:'POST'});
  loadTopics();
}

async function clearActiveTopic() {
  // Find active and deactivate
  const res  = await fetch('/api/topics');
  const data = await res.json();
  const active = (data.topics||[]).find(t=>t.active);
  if (active) await fetch(`/api/topics/${active.id}/activate`,{method:'POST'});
  loadTopics();
}

/* ── Tailscale UI ── */
async function loadTailscale() {
  try {
    const res  = await fetch('/api/tailscale');
    const data = await res.json();
    const list = document.getElementById('ts-list');
    if (data.error) {
      list.innerHTML=`<div class="ts-machine" style="color:var(--red);font-size:10px">${esc(data.error)}</div>`;
      return;
    }
    list.innerHTML = (data.machines||[]).map(m => {
      const mx = m.metrics;
      const sshClass = !m.ssh_configured ? 'ssh-none'
                     : mx?.live          ? 'ssh-live'
                     : m.ssh_configured  ? 'ssh-dead' : 'ssh-none';

      let metricsHtml = '';
      if (mx) {
        const cpuCls  = mx.cpu_pct  > 85 ? 'crit' : mx.cpu_pct  > 70 ? 'warn' : '';
        const memCls  = mx.mem_pct  > 90 ? 'crit' : mx.mem_pct  > 80 ? 'warn' : '';
        const diskCls = mx.disk_pct > 90 ? 'crit' : mx.disk_pct > 80 ? 'warn' : '';
        metricsHtml = `<div class="ts-metrics">
          <span class="ts-metric ${cpuCls}">CPU ${mx.cpu_pct ?? '?'}%</span>
          <span class="ts-metric ${memCls}">RAM ${mx.mem_pct ?? '?'}%</span>
          <span class="ts-metric ${diskCls}">Disk ${mx.disk_pct ?? '?'}%</span>
          ${mx.load_1m >= 0 ? `<span class="ts-metric">Load ${mx.load_1m}</span>` : ''}
        </div>`;
      }

      const sshTip = !m.ssh_configured ? 'SSH: not configured'
                   : mx?.live          ? 'SSH: live connection'
                   : 'SSH: reconnecting…';

      return `<div class="ts-machine">
        <div class="ts-dots">
          <div class="ts-dot ts ${m.online?'':'off'}" title="Tailscale: ${m.online?'online':'offline'}"></div>
          <div class="ts-dot ${sshClass}" title="${sshTip}"></div>
        </div>
        <div class="ts-info">
          <div class="ts-name">${esc(m.hostname)}${m.self?'<span class="ts-self-badge">this</span>':''}</div>
          <div class="ts-sub">${esc(m.ip)}${m.os?' · '+esc(m.os):''}</div>
          ${metricsHtml}
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('ts-list').innerHTML=
      '<div class="ts-machine" style="color:var(--muted);font-size:10px">Tailscale unavailable</div>';
  }
}

/* ── Concepts UI ── */
async function loadConcepts() {
  try {
    const res  = await fetch('/api/concepts');
    const data = await res.json();
    const list = document.getElementById('concepts-list');
    list.innerHTML = (data.concepts||[]).map(c=>`
      <div class="concept-item">
        <span class="concept-badge ${esc(c.category)}">${esc(c.category)}</span>
        <span class="concept-text">${esc(c.text)}</span>
      </div>`).join('') || '<div style="padding:10px 12px;font-size:10px;color:var(--border)">No concepts yet</div>';
  } catch{}
}

/* ── Settings ── */
function toggleSettings() { document.getElementById('settings').classList.toggle('open'); }

async function saveConfig() {
  await fetch('/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    url:         document.getElementById('cfg-url').value.trim(),
    model:       document.getElementById('cfg-model').value.trim(),
    api_key:     document.getElementById('cfg-key').value.trim(),
    piper_voice: document.getElementById('cfg-voice').value,
  })});
  flash('sv-msg','Saved!');
}

async function pingServer() {
  const dot = document.getElementById('api-dot');
  dot.className=''; await saveConfig();
  try {
    const res  = await fetch('/ping',{method:'POST'});
    const data = await res.json();
    dot.className = data.status==='online'?'online':'offline';
    if (data.models?.length) document.getElementById('cfg-model').placeholder=data.models[0];
  } catch { dot.className='offline'; }
}

async function downloadVoice() {
  const voice = document.getElementById('cfg-voice').value;
  const msg   = document.getElementById('dl-msg');
  msg.textContent='Downloading…';
  const res    = await fetch('/tts/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({voice})});
  const reader = res.body.getReader(); const dec = new TextDecoder();
  while(true){const{done,value}=await reader.read();if(done)break;const l=dec.decode(value).replace(/^data: /,'').trim();if(l)msg.textContent=l.slice(0,55);}
  msg.textContent='Done!'; setTimeout(()=>msg.textContent='',3000);
}

async function loadAudioSinks() {
  try {
    const res  = await fetch('/api/audio/sinks');
    const data = await res.json();
    const sel  = document.getElementById('cfg-sink');
    const cur  = sel.value;
    sel.innerHTML = '<option value="">System Default</option>';
    (data.sinks||[]).forEach(s => {
      const o = document.createElement('option');
      o.value = s.name;
      o.textContent = s.desc || s.name;
      sel.appendChild(o);
    });
    if (cur) sel.value = cur;
  } catch {}
}

async function saveAudio() {
  await fetch('/config', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      piper_voice: document.getElementById('cfg-voice').value,
      tts_sink:    document.getElementById('cfg-sink').value,
      tts_style:   document.getElementById('cfg-style').value,
      tts_speed:   document.getElementById('cfg-speed').value,
      tts_volume:  document.getElementById('cfg-volume').value,
    })
  });
  flash('sv-msg', 'Audio saved!');
}

async function testTts() {
  await fetch('/config', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      piper_voice: document.getElementById('cfg-voice').value,
      tts_sink:    document.getElementById('cfg-sink').value,
      tts_style:   document.getElementById('cfg-style').value,
      tts_speed:   document.getElementById('cfg-speed').value,
      tts_volume:  document.getElementById('cfg-volume').value,
    })
  });
  setState('speaking');
  await fetch('/tts', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text: "Hello, I am Jarvis. Audio test complete." })
  });
  setState('');
}

async function testSshHost() {
  const hn  = document.getElementById('ssh-hostname').value.trim();
  const out = document.getElementById('ssh-test-out');
  const msg = document.getElementById('ssh-msg');
  if (!hn) { flash('ssh-msg', 'Enter hostname first'); return; }
  msg.textContent = 'Testing…';
  out.textContent = '';
  try {
    const res  = await fetch(`/api/ssh/test/${hn}`, { method:'POST' });
    const data = await res.json();
    msg.textContent = data.ok ? '✓ Connected' : '✗ Failed';
    msg.style.color = data.ok ? 'var(--green)' : 'var(--red)';
    out.textContent = data.output || data.error || '';
    setTimeout(() => { msg.textContent=''; msg.style.color='var(--green)'; }, 4000);
  } catch(e) {
    msg.textContent = '✗ Error'; msg.style.color = 'var(--red)';
  }
}

async function resetConversation() {
  await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reset:true})});
  txYou.textContent=''; txJarvis.textContent='';
  document.getElementById('settings').classList.remove('open');
}

function flash(id,msg,ms=2000){const e=document.getElementById(id);e.textContent=msg;setTimeout(()=>e.textContent='',ms);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── Mic enumeration ── */
async function loadMics() {
  try {
    await navigator.mediaDevices.getUserMedia({audio:true});
    const devs = await navigator.mediaDevices.enumerateDevices();
    const sel  = document.getElementById('mic-select');
    sel.innerHTML='<option value="">Default</option>';
    devs.filter(d=>d.kind==='audioinput').forEach(d=>{
      const o=document.createElement('option');o.value=d.deviceId;
      o.textContent=d.label||`Mic ${d.deviceId.slice(0,8)}`;sel.appendChild(o);
    });
    sel.onchange=()=>micId=sel.value;
  }catch{}
}

/* ── Keyboard ── */
document.addEventListener('keydown',e=>{
  if(e.target!==document.body)return;
  if(e.code==='Space'){e.preventDefault();orbClick();}
  if(e.key==='Escape'){interrupt();document.getElementById('settings').classList.remove('open');}
});

/* ── SSH settings UI ── */
async function loadSshHosts() {
  try {
    const res  = await fetch('/api/ssh/hosts');
    const data = await res.json();
    const el   = document.getElementById('ssh-host-list');
    if (!data.hosts?.length) { el.textContent = 'No SSH hosts configured.'; return; }
    el.innerHTML = data.hosts.map(h => {
      const dot = h.live ? '🟢' : (h.last_error ? '🔴' : '🟡');
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)">
        <span>${dot} ${esc(h.username)}@${esc(h.hostname)}</span>
        <button onclick="removeSshHost('${esc(h.hostname)}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;">×</button>
      </div>`;
    }).join('');
  } catch {}
}

async function addSshHost() {
  const hostname = document.getElementById('ssh-hostname').value.trim();
  const ip       = document.getElementById('ssh-ip').value.trim();
  if (!hostname || !ip) { flash('ssh-msg','Hostname and IP required'); return; }
  const res = await fetch('/api/ssh/hosts', { method:'POST',
    headers:{'Content-Type':'application/json'}, body: JSON.stringify({
      hostname, ip,
      username: document.getElementById('ssh-user').value.trim() || 'root',
      port:     parseInt(document.getElementById('ssh-port').value) || 22,
      key_path: document.getElementById('ssh-key').value.trim(),
      password: document.getElementById('ssh-pass').value,
    })
  });
  const d = await res.json();
  flash('ssh-msg', d.status || 'Added!');
  loadSshHosts(); loadTailscale();
}

async function removeSshHost(hostname) {
  await fetch(`/api/ssh/hosts/${hostname}`, { method:'DELETE' });
  loadSshHosts(); loadTailscale();
}

/* ── Slider display ── */
document.getElementById('cfg-speed').addEventListener('input', e => {
  document.getElementById('speed-val').textContent = parseFloat(e.target.value).toFixed(2) + '×';
});
document.getElementById('cfg-volume').addEventListener('input', e => {
  document.getElementById('vol-val').textContent = parseFloat(e.target.value).toFixed(2) + '×';
});

/* ── Init + polling ── */
loadMics();
loadAudioSinks();
pingServer();
loadTopics();
loadTailscale();
loadConcepts();
loadSshHosts();
document.getElementById('cfg-voice').value  = '{{ config.piper_voice }}';
document.getElementById('cfg-style').value  = '{{ config.tts_style }}';
document.getElementById('cfg-speed').value  = '{{ config.tts_speed }}';
document.getElementById('cfg-volume').value = '{{ config.tts_volume }}';
document.getElementById('speed-val').textContent  = '{{ config.tts_speed }}×';
document.getElementById('vol-val').textContent    = '{{ config.tts_volume }}×';

setInterval(loadTopics,    5000);
setInterval(loadTailscale, 10000);   // faster now — shows live SSH state
setInterval(loadConcepts,  15000);
setInterval(loadSshHosts,  15000);
</script>
</body>
</html>
