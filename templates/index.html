<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jarvis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #050a0f;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Settings drawer ─────────────────────── */
    #settings-toggle {
      position: fixed;
      top: 14px; right: 16px;
      background: none;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #8b949e;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      z-index: 100;
    }
    #settings-toggle:hover { background: #161b22; color: #e6edf3; }

    #settings {
      position: fixed;
      top: 0; right: 0;
      width: 340px;
      height: 100vh;
      background: #0d1117;
      border-left: 1px solid #21262d;
      padding: 60px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 99;
      overflow-y: auto;
    }
    #settings.open { transform: translateX(0); }

    .setting-group { display: flex; flex-direction: column; gap: 6px; }
    .setting-group label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
    .setting-group input, .setting-group select {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 8px 10px;
      font-size: 13px;
      width: 100%;
    }
    .setting-group input:focus, .setting-group select:focus { outline: none; border-color: #58a6ff; }

    .s-row { display: flex; gap: 8px; align-items: center; }
    .s-btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .s-btn:hover { background: #30363d; }
    .s-btn.primary { background: #1f6feb; border-color: #1f6feb; }
    .s-btn.primary:hover { background: #388bfd; }
    .s-btn.danger { background: #6e2c2c; border-color: #8b3030; }
    .s-btn.danger:hover { background: #8b3030; }

    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #484f58; flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.online  { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    #status-dot.offline { background: #f85149; }
    #save-msg { font-size: 11px; color: #3fb950; min-height: 16px; }

    #settings hr { border: none; border-top: 1px solid #21262d; }
    #settings h3 { font-size: 11px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1px; }

    /* ── Main stage ──────────────────────────── */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    /* Orb */
    #orb-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      cursor: pointer;
    }
    #orb {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1a3a5c, #0a1628);
      box-shadow:
        0 0 0 0 rgba(88, 166, 255, 0),
        0 0 40px rgba(31, 111, 235, 0.25),
        inset 0 0 30px rgba(0,0,0,0.5);
      transition: box-shadow 0.3s ease, background 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #orb svg { opacity: 0.7; }

    /* Listening */
    body.listening #orb {
      background: radial-gradient(circle at 35% 35%, #0d3320, #051a10);
      box-shadow:
        0 0 0 20px rgba(63, 185, 80, 0.08),
        0 0 60px rgba(63, 185, 80, 0.3),
        inset 0 0 30px rgba(0,0,0,0.5);
      animation: pulse-listen 1.4s ease-in-out infinite;
    }
    @keyframes pulse-listen {
      0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.3), 0 0 60px rgba(63,185,80,0.3), inset 0 0 30px rgba(0,0,0,0.5); }
      50%       { box-shadow: 0 0 0 28px rgba(63,185,80,0.0), 0 0 80px rgba(63,185,80,0.5), inset 0 0 30px rgba(0,0,0,0.5); }
    }

    /* Thinking */
    body.thinking #orb {
      background: radial-gradient(circle at 35% 35%, #2a1a4a, #0f0720);
      box-shadow:
        0 0 0 0 rgba(139,92,246,0),
        0 0 60px rgba(139,92,246,0.35),
        inset 0 0 30px rgba(0,0,0,0.5);
      animation: spin-glow 2s linear infinite;
    }
    @keyframes spin-glow {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* Speaking */
    body.speaking #orb {
      background: radial-gradient(circle at 35% 35%, #1f3a1f, #0a1f0a);
      animation: pulse-speak 0.6s ease-in-out infinite alternate;
    }
    @keyframes pulse-speak {
      from { box-shadow: 0 0 20px rgba(88,166,255,0.2), 0 0 60px rgba(88,166,255,0.15), inset 0 0 30px rgba(0,0,0,0.5); }
      to   { box-shadow: 0 0 40px rgba(88,166,255,0.5), 0 0 100px rgba(88,166,255,0.3), inset 0 0 30px rgba(0,0,0,0.5); }
    }

    /* State label */
    #state-label {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #484f58;
      transition: color 0.3s;
      min-height: 20px;
    }
    body.listening #state-label { color: #3fb950; }
    body.thinking  #state-label { color: #8b5cf6; }
    body.speaking  #state-label { color: #58a6ff; }

    /* Hint */
    #hint {
      font-size: 12px;
      color: #30363d;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* Transcript strip */
    #transcript {
      max-width: 560px;
      width: 90vw;
      text-align: center;
      min-height: 48px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #transcript-you {
      font-size: 13px;
      color: #58a6ff;
      min-height: 18px;
      font-style: italic;
    }
    #transcript-jarvis {
      font-size: 15px;
      color: #c9d1d9;
      min-height: 22px;
      line-height: 1.5;
    }

    /* Tool activity pill */
    #tool-pill {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px;
      color: #8b949e;
      display: none;
      white-space: nowrap;
    }
    #tool-pill.visible { display: block; }

    /* Waveform bars (decorative, shown while speaking) */
    #wave {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 30px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    body.speaking #wave, body.listening #wave { opacity: 1; }
    .bar {
      width: 3px;
      border-radius: 2px;
      background: #58a6ff;
      animation: wave-anim 0.8s ease-in-out infinite;
    }
    body.listening .bar { background: #3fb950; }
    .bar:nth-child(1)  { animation-delay: 0.0s; height: 8px; }
    .bar:nth-child(2)  { animation-delay: 0.1s; height: 18px; }
    .bar:nth-child(3)  { animation-delay: 0.2s; height: 12px; }
    .bar:nth-child(4)  { animation-delay: 0.3s; height: 22px; }
    .bar:nth-child(5)  { animation-delay: 0.4s; height: 14px; }
    .bar:nth-child(6)  { animation-delay: 0.5s; height: 24px; }
    .bar:nth-child(7)  { animation-delay: 0.6s; height: 10px; }
    .bar:nth-child(8)  { animation-delay: 0.7s; height: 20px; }
    .bar:nth-child(9)  { animation-delay: 0.8s; height: 8px;  }
    @keyframes wave-anim {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1.0); }
    }
  </style>
</head>
<body>

<!-- Settings toggle -->
<button id="settings-toggle" onclick="toggleSettings()">⚙ Settings</button>

<!-- Settings drawer -->
<div id="settings">
  <h3>Connection</h3>

  <div class="setting-group">
    <label>LM Studio API URL</label>
    <input id="api-url-input" type="text" value="{{ config.url }}" placeholder="http://100.x.x.x:1234"/>
  </div>

  <div class="setting-group">
    <label>Model</label>
    <input id="model-input" type="text" value="{{ config.model }}" placeholder="local-model"/>
  </div>

  <div class="setting-group">
    <label>API Key</label>
    <input id="api-key-input" type="password" value="{{ config.api_key }}" placeholder="optional"/>
  </div>

  <div class="s-row">
    <button class="s-btn primary" onclick="saveConfig()">Save</button>
    <button class="s-btn" onclick="pingServer()">Test</button>
    <div id="status-dot"></div>
    <span id="save-msg"></span>
  </div>

  <hr/>
  <h3>Voice</h3>

  <div class="setting-group">
    <label>Microphone</label>
    <select id="mic-select"><option value="">Default microphone</option></select>
  </div>

  <div class="setting-group">
    <label>TTS Voice</label>
    <select id="voice-select"><option value="">Default voice</option></select>
  </div>

  <div class="setting-group">
    <label>TTS Speed</label>
    <input id="tts-rate" type="range" min="0.5" max="2" step="0.05" value="1" style="padding:0"/>
    <span id="tts-rate-val" style="font-size:11px;color:#8b949e">1.0×</span>
  </div>

  <div class="setting-group">
    <label>TTS Pitch</label>
    <input id="tts-pitch" type="range" min="0.5" max="2" step="0.05" value="1" style="padding:0"/>
    <span id="tts-pitch-val" style="font-size:11px;color:#8b949e">1.0</span>
  </div>

  <hr/>
  <button class="s-btn danger" onclick="resetConversation()">Clear Conversation</button>
</div>

<!-- Main -->
<div id="stage">
  <!-- Orb -->
  <div id="orb-wrap" onclick="toggleListen()" title="Click or press Space to talk">
    <div id="orb">
      <!-- J logo -->
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
              font-family="Segoe UI,sans-serif" font-size="38" font-weight="700" fill="#58a6ff">J</text>
      </svg>
    </div>
  </div>

  <!-- Waveform -->
  <div id="wave">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>

  <!-- Status label -->
  <div id="state-label">Ready</div>

  <!-- Transcript -->
  <div id="transcript">
    <div id="transcript-you"></div>
    <div id="transcript-jarvis"></div>
  </div>
</div>

<!-- Tool activity -->
<div id="tool-pill"></div>

<!-- Hint -->
<div id="hint">Click the orb or press Space to speak</div>

<script>
  /* ── State ─────────────────────────────────────────── */
  let recognition   = null;
  let isListening   = false;
  let isBusy        = false;
  let selectedMicId = "";
  let voices        = [];

  const body         = document.body;
  const stateLabel   = document.getElementById('state-label');
  const txYou        = document.getElementById('transcript-you');
  const txJarvis     = document.getElementById('transcript-jarvis');
  const toolPill     = document.getElementById('tool-pill');

  /* ── State helpers ─────────────────────────────────── */
  function setState(s) {
    body.className = s;
    stateLabel.textContent = { '': 'Ready', listening: 'Listening…', thinking: 'Thinking…', speaking: 'Speaking…' }[s] ?? s;
  }

  function showTool(name) {
    toolPill.textContent = `⚙ ${name}`;
    toolPill.classList.add('visible');
  }
  function hideTool() { toolPill.classList.remove('visible'); }

  /* ── Settings ──────────────────────────────────────── */
  function toggleSettings() {
    document.getElementById('settings').classList.toggle('open');
  }

  async function saveConfig() {
    const url     = document.getElementById('api-url-input').value.trim();
    const model   = document.getElementById('model-input').value.trim();
    const api_key = document.getElementById('api-key-input').value.trim();
    await fetch('/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({url, model, api_key}) });
    const m = document.getElementById('save-msg');
    m.textContent = 'Saved!';
    setTimeout(() => m.textContent = '', 2000);
  }

  async function pingServer() {
    const dot = document.getElementById('status-dot');
    dot.className = '';
    try {
      await saveConfig();
      const res  = await fetch('/ping', { method:'POST' });
      const data = await res.json();
      dot.className = data.status === 'online' ? 'online' : 'offline';
      if (data.models?.length) document.getElementById('model-input').placeholder = data.models[0];
    } catch { dot.className = 'offline'; }
  }

  async function resetConversation() {
    await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({reset: true}) });
    txYou.textContent    = '';
    txJarvis.textContent = '';
    speak("Conversation cleared.");
  }

  /* ── Microphone enumeration ────────────────────────── */
  async function loadMics() {
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true }); // trigger permission
      const devices = await navigator.mediaDevices.enumerateDevices();
      const sel = document.getElementById('mic-select');
      sel.innerHTML = '<option value="">Default microphone</option>';
      devices.filter(d => d.kind === 'audioinput').forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Microphone ${d.deviceId.slice(0,8)}`;
        sel.appendChild(opt);
      });
      sel.onchange = () => { selectedMicId = sel.value; };
    } catch(e) {
      console.warn('Mic enumeration failed:', e);
    }
  }

  /* ── TTS voices ─────────────────────────────────────── */
  function loadVoices() {
    voices = speechSynthesis.getVoices();
    const sel = document.getElementById('voice-select');
    sel.innerHTML = '<option value="">Default voice</option>';
    voices.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      sel.appendChild(opt);
    });
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();

  document.getElementById('tts-rate').addEventListener('input', e => {
    document.getElementById('tts-rate-val').textContent = parseFloat(e.target.value).toFixed(2) + '×';
  });
  document.getElementById('tts-pitch').addEventListener('input', e => {
    document.getElementById('tts-pitch-val').textContent = parseFloat(e.target.value).toFixed(2);
  });

  /* ── TTS ────────────────────────────────────────────── */
  function speak(text) {
    if (!text) return;
    speechSynthesis.cancel();
    setState('speaking');
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate  = parseFloat(document.getElementById('tts-rate').value);
    utt.pitch = parseFloat(document.getElementById('tts-pitch').value);
    const vi  = document.getElementById('voice-select').value;
    if (vi !== '' && voices[parseInt(vi)]) utt.voice = voices[parseInt(vi)];
    utt.onend = () => { setState(''); isBusy = false; };
    utt.onerror = () => { setState(''); isBusy = false; };
    speechSynthesis.speak(utt);
  }

  /* ── Speech recognition ─────────────────────────────── */
  function buildRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition not supported. Use Chromium or Chrome.'); return null; }
    const r = new SR();
    r.continuous      = false;
    r.interimResults  = true;
    r.lang            = 'en-US';

    r.onstart = () => { setState('listening'); };

    r.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final   += e.results[i][0].transcript;
        else                      interim += e.results[i][0].transcript;
      }
      txYou.textContent = (final || interim).trim();
    };

    r.onerror = (e) => {
      console.error('STT error', e.error);
      setState('');
      isListening = false;
      isBusy = false;
    };

    r.onend = async () => {
      isListening = false;
      const text = txYou.textContent.trim();
      if (!text) { setState(''); isBusy = false; return; }
      await sendToJarvis(text);
    };

    return r;
  }

  function toggleListen() {
    if (isBusy) {
      speechSynthesis.cancel();
      setState('');
      isBusy = false;
      return;
    }
    if (isListening) {
      recognition?.stop();
      return;
    }
    isBusy = true;
    isListening = true;
    recognition = buildRecognition();
    if (!recognition) { isBusy = false; isListening = false; return; }

    // If a specific mic is chosen, start that stream first
    if (selectedMicId) {
      navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: selectedMicId } } })
        .then(() => recognition.start())
        .catch(() => recognition.start());
    } else {
      recognition.start();
    }
  }

  /* ── Send to Jarvis ─────────────────────────────────── */
  async function sendToJarvis(text) {
    setState('thinking');
    txJarvis.textContent = '';

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();

      if (data.tools?.length) {
        for (const t of data.tools) { showTool(t.tool); await delay(400); }
        hideTool();
      }

      const reply = data.error ? `Error: ${data.error}` : data.reply;
      txJarvis.textContent = reply;
      speak(reply);
    } catch(e) {
      setState('');
      isBusy = false;
      txJarvis.textContent = 'Connection error.';
    }
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  /* ── Keyboard shortcut ──────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      toggleListen();
    }
    if (e.key === 'Escape') {
      document.getElementById('settings').classList.remove('open');
      speechSynthesis.cancel();
      recognition?.stop();
      setState('');
      isBusy = false;
    }
  });

  /* ── Init ───────────────────────────────────────────── */
  loadMics();
  pingServer();
</script>
</body>
</html>
