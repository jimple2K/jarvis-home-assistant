<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jarvis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top config bar ── */
    #config-bar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #config-bar label { font-size: 12px; color: #8b949e; white-space: nowrap; }
    #config-bar input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 5px 10px;
      font-size: 13px;
    }
    #api-url-input { width: 230px; }
    #model-input   { width: 180px; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #484f58; flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.online  { background: #3fb950; }
    #status-dot.offline { background: #f85149; }
    .btn {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #30363d; }
    .btn.primary { background: #1f6feb; border-color: #1f6feb; }
    .btn.primary:hover { background: #388bfd; }
    #save-status { font-size: 12px; color: #3fb950; display: none; }
    #jarvis-title {
      font-size: 15px; font-weight: 600;
      color: #58a6ff; letter-spacing: 2px;
      margin-right: auto;
    }

    /* ── Chat area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg { display: flex; gap: 10px; max-width: 780px; }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.jarvis { align-self: flex-start; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .msg.user .avatar   { background: #1f6feb; }
    .msg.jarvis .avatar { background: #21262d; border: 1px solid #30363d; }
    .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 660px;
      white-space: pre-wrap;
    }
    .msg.user .bubble   { background: #1f6feb; border-radius: 12px 2px 12px 12px; }
    .msg.jarvis .bubble { background: #161b22; border: 1px solid #30363d; border-radius: 2px 12px 12px 12px; }
    .typing { color: #8b949e; font-style: italic; font-size: 13px; }

    /* ── Input bar ── */
    #input-bar {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
    }
    #user-input:focus { outline: none; border-color: #58a6ff; }
    #send-btn {
      background: #1f6feb;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
    }
    #send-btn:hover { background: #388bfd; }
    #send-btn:disabled { background: #21262d; color: #484f58; cursor: default; }
  </style>
</head>
<body>

<!-- ── Config bar ── -->
<div id="config-bar">
  <span id="jarvis-title">J A R V I S</span>

  <label>API URL</label>
  <input id="api-url-input" type="text" value="{{ config.url }}" placeholder="http://100.x.x.x:1234" />

  <label>Model</label>
  <input id="model-input" type="text" value="{{ config.model }}" placeholder="local-model" />

  <button class="btn" onclick="pingServer()">Test Connection</button>
  <button class="btn primary" onclick="saveConfig()">Save</button>
  <span id="save-status">Saved!</span>
  <div id="status-dot" title="Server status"></div>

  <button class="btn" onclick="resetChat()" style="margin-left:auto;">New Chat</button>
</div>

<!-- ── Messages ── -->
<div id="messages">
  <div class="msg jarvis">
    <div class="avatar">🤖</div>
    <div class="bubble">Online and ready. How can I help?</div>
  </div>
</div>

<!-- ── Input bar ── -->
<div id="input-bar">
  <textarea id="user-input" rows="1" placeholder="Ask Jarvis anything…"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '🧑' : '🤖'}</div>
      <div class="bubble">${escHtml(text)}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addMessage('user', text);

    const typingDiv = document.createElement('div');
    typingDiv.className = 'msg jarvis';
    typingDiv.innerHTML = '<div class="avatar">🤖</div><div class="bubble typing">Thinking…</div>';
    messagesEl.appendChild(typingDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res  = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message: text}) });
      const data = await res.json();
      typingDiv.remove();
      if (data.error) addMessage('jarvis', `Error: ${data.error}`);
      else            addMessage('jarvis', data.reply);
    } catch(e) {
      typingDiv.remove();
      addMessage('jarvis', 'Connection error — is the server running?');
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function saveConfig() {
    const url   = document.getElementById('api-url-input').value.trim();
    const model = document.getElementById('model-input').value.trim();
    await fetch('/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({url, model}) });
    const s = document.getElementById('save-status');
    s.style.display = 'inline';
    setTimeout(() => s.style.display = 'none', 2000);
  }

  async function pingServer() {
    statusDot.className = '';
    try {
      await saveConfig();
      const res  = await fetch('/ping', { method:'POST' });
      const data = await res.json();
      if (data.status === 'online') {
        statusDot.className = 'online';
        if (data.models?.length) document.getElementById('model-input').placeholder = data.models[0];
      } else {
        statusDot.className = 'offline';
      }
    } catch { statusDot.className = 'offline'; }
  }

  async function resetChat() {
    await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({reset: true}) });
    messagesEl.innerHTML = '';
    addMessage('jarvis', 'Chat cleared. How can I help?');
  }

  // Auto-ping on load
  pingServer();
</script>
</body>
</html>
